name: R CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  build:

    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest}
          - {os: macos-latest}
          - {os: windows-latest}

    steps:

      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get -y install libgsl-dev libgomp1

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gsl gcc
          GCC=$(ls $(brew --prefix gcc)/bin/gcc-* | grep -oE 'gcc-[0-9]+$' | head -1)
          VER=${GCC#gcc-}
          mkdir -p ~/.R
          echo "CC=gcc-${VER}" >> ~/.R/Makevars
          echo "CXX=g++-${VER}" >> ~/.R/Makevars
          echo "FC=gfortran-${VER}" >> ~/.R/Makevars
          echo "CPPFLAGS=-I$(brew --prefix gsl)/include" >> ~/.R/Makevars
          echo "LDFLAGS=-L$(brew --prefix gsl)/lib" >> ~/.R/Makevars

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: pacman -Sy --noconfirm mingw-w64-ucrt-x86_64-gsl

      - name: Install R packages
        run: Rscript -e "install.packages(c('Rcpp', 'testthat'))"

      - uses: r-lib/actions/setup-tinytex@v2
        
      - name: R CMD check
        shell: bash
        working-directory: R/Volaris
        run: R CMD check --as-cran .