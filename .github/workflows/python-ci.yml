name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  build:

    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest}
          - {os: macos-latest}
          - {os: windows-latest}

    steps:
    
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get -y install libgsl-dev libgomp1
          pip install cython numpy pytest

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gsl gcc libomp
          GCC=$(ls $(brew --prefix gcc)/bin/gcc-* | grep -oE 'gcc-[0-9]+$' | head -1)
          VER=${GCC#gcc-}
          echo "CC=gcc-${VER}" >> $GITHUB_ENV
          echo "CXX=g++-${VER}" >> $GITHUB_ENV
          pip install cython numpy pytest

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:CONDA\Scripts\conda.exe" install -y -c conda-forge gsl numpy cython
          pip install pytest

      - name: Install Volaris
        run: pip install -e . --no-build-isolation
        working-directory: python

      - name: Test
        run: pytest tests/ -v
        working-directory: python